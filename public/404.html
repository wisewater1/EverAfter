<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Not Found</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #0f172a;
        color: #cbd5e1;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .card {
        max-width: 28rem;
        padding: 2rem;
        border-radius: 1rem;
        background: rgba(15, 23, 42, 0.92);
        border: 1px solid rgba(148, 163, 184, 0.24);
        box-shadow: 0 20px 40px rgba(2, 6, 23, 0.35);
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: 1.5rem;
        color: #f8fafc;
      }

      p {
        margin: 0;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Asset not found</h1>
      <p>This file is no longer part of the current EverAfter deployment. Reload the app to fetch the latest bundle.</p>
    </div>
  </body>
  </html>
